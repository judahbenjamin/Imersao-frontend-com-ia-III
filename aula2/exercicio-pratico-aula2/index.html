<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">Netflix</div>
    </header>
    <main>
        <h1>Quem está assistindo?</h1>
        <section aria-label="Perfis disponíveis">
            <nav class="profiles">
                <a href="#" class="profile">
                    <figure>
                        <img src="assets/perfil-1.jpeg" alt="Gipsy Danger, o robô gigante do filme 'Círculo de Fogo'">
                        <figcaption>Takumi</figcaption>
                    </figure>
                </a>
                <a href="#" class="profile">
                    <figure>
                        <img src="assets/perfil-2.jpeg" alt="Striker Eureka, o robô gigante do filme 'Círculo de Fogo'">
                        <figcaption>Owen</figcaption>
                    </figure>
                </a>
                <a href="#" class="profile">
                    <figure>
                        <img src="assets/perfil-3.jpeg" alt="Crimson Typhoon, o robô gigante do filme 'Círculo de Fogo'">
                        <figcaption>Yuri</figcaption>
                    </figure>
                </a>
                <a href="#" class="profile">
                    <figure>
                        <img src="assets/perfil-4.jpeg" alt="Cherno Alpha, o robô gigante do filme 'Círculo de Fogo'">
                        <figcaption>Lety</figcaption>
                    </figure>
                </a>
            </nav>
            <div class="manage-profiles-container">
                <button class="manage-profiles-btn">Gerenciar perfis</button>
            </div>
        </section>
    </main>
    <footer>
        <nav>
            <a href="#">Perguntas frequentes</a>
            <a href="#">Centro de ajuda</a>
            <a href="#">Termos de uso</a>
            <a href="#">Privacidade</a>
            <a href="#">Preferências de cookies</a>
            <a href="#">Informações corporativas</a>
        </nav>
    </footer>
</body>
</html>
