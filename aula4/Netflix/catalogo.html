<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix - Catálogo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="logo">
            <img src="https://upload.wikimedia.org/wikipedia/commons/7/7a/Logonetflix.png" alt="Netflix Logo">
        </div>
        <nav class="nav">
            <ul>
                <li><a href="#">Início</a></li>
                <li><a href="#">Séries</a></li>
                <li><a href="#">Filmes</a></li>
                <li><a href="#">Bombando</a></li>
                <li><a href="#">Minha lista</a></li>
            </ul>
        </nav>
        <div class="header-right">
            <div class="search">
                <input type="text" placeholder="Buscar">
                <button>🔍</button>
            </div>
            <div class="profile" id="active-profile">
                <img src="" alt="Perfil Ativo">
            </div>
        </div>
    </header>

    <main>
        <section class="hero">
            <div class="hero-content">
                <h1>Bem-vindo, <span id="profile-name"></span>!</h1>
                <p>Explore os melhores filmes e séries.</p>
            </div>
            <div class="hero-bg">
                <img src="https://via.placeholder.com/1920x1080/000000/ffffff?text=Catálogo+Netflix" alt="Hero Background">
            </div>
        </section>

        <section class="row">
            <h2>Bombando agora</h2>
            <div class="carousel">
                <div class="item"><img src="https://via.placeholder.com/300x169/ff0000/ffffff?text=Filme1" alt="Filme 1"></div>
                <div class="item"><img src="https://via.placeholder.com/300x169/ff0000/ffffff?text=Filme2" alt="Filme 2"></div>
                <div class="item"><img src="https://via.placeholder.com/300x169/ff0000/ffffff?text=Filme3" alt="Filme 3"></div>
            </div>
        </section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const activeProfile = JSON.parse(localStorage.getItem('activeProfile'));
            if (activeProfile) {
                document.getElementById('profile-name').textContent = activeProfile.name;
                document.querySelector('#active-profile img').src = activeProfile.image;
            } else {
                // Fallback if no profile
                document.getElementById('profile-name').textContent = 'Usuário';
                document.querySelector('#active-profile img').src = 'assets/perfil-1.jpeg';
            }
        });
    </script>
</body>
</html>
